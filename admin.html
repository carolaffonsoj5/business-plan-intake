<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DataControl Solutions — Relatórios (Admin)</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0B1F3A;--slate:#1C3A5E;--gold:#C9A227;--ink:#16202e;--muted:#5d6b7d;--line:#e4e8ee;--bg:#eef1f5;}
  *{box-sizing:border-box}body{margin:0;font-family:'Archivo',system-ui,sans-serif;color:var(--ink);background:var(--bg)}
  .top{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:13px 22px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .name{font-weight:800;font-size:15px;color:var(--gold)}
  .brand .name small{display:block;font-weight:500;font-size:9px;letter-spacing:.9px;text-transform:uppercase;color:#9fb0c6;margin-top:3px}
  .btn{appearance:none;border:0;font-family:inherit;font-weight:700;font-size:13.5px;border-radius:10px;padding:10px 18px;cursor:pointer;transition:.15s}
  .btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:#d8b02f}
  .btn-ghost{background:#fff;color:var(--slate);border:1.5px solid var(--line)}.btn-ghost:hover{background:#f8fafc}
  .btn-out{background:transparent;color:#cdd7e5;border:1px solid rgba(255,255,255,.2)}.btn-out:hover{color:#fff}
  /* login */
  .login{max-width:380px;margin:9vh auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:32px;box-shadow:0 18px 50px -20px rgba(11,31,58,.3)}
  .login h1{font-size:20px;margin:0 0 4px}.login p{color:var(--muted);font-size:14px;margin:0 0 22px}
  label{display:block;font-weight:600;font-size:13.5px;margin:14px 0 6px}
  input{width:100%;font-family:inherit;font-size:15px;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;outline:none}
  input:focus{border-color:var(--slate);box-shadow:0 0 0 4px rgba(28,58,94,.1)}
  .err{color:#b4451f;font-size:13px;font-weight:600;margin-top:12px;min-height:18px}
  /* layout */
  .toolbar{max-width:1200px;margin:22px auto 0;padding:0 22px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .toolbar input{flex:1;min-width:200px;padding:10px 13px}
  .toolbar select{width:auto;padding:10px 13px;font-family:inherit;font-size:14px;border:1.5px solid var(--line);border-radius:10px;background:#fff}
  .wrap{display:grid;grid-template-columns:340px 1fr;gap:20px;max-width:1200px;margin:14px auto 22px;padding:0 22px;align-items:start}
  .list{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .list .hd{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
  .item{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
  .item:hover{background:#f6f8fb}.item.sel{background:#f4f8fd;border-left:3px solid var(--gold)}
  .item .nm{font-weight:700;font-size:14.5px}.item .em{font-size:12.5px;color:var(--muted)}
  .badge{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:5px;margin-top:6px}
  .badge.submitted{background:#e7f4ec;color:#1f6b48;border:1px solid #cfe6d8}
  .badge.draft{background:#fbf3d6;color:#8a6d12;border:1px solid #ecd99a}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;min-height:60vh}
  .panel .ph{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .panel .ph h2{font-size:17px;margin:0}
  .docs{padding:6px 18px 16px}
  .docs h3{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin:14px 0 8px}
  .doc{display:inline-flex;align-items:center;gap:7px;font-size:13px;background:#f4f8fd;border:1px solid #d8e3f0;border-radius:8px;padding:7px 11px;margin:0 8px 8px 0;color:#1C3A5E;text-decoration:none}
  .doc:hover{background:#e9f1fb}
  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .reportbox{padding:4px}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}}
  @media print{.top,.list,.panel .ph,.docs{display:none}.wrap{display:block;margin:0}.panel{border:0}}
</style>
</head>
<body>
<div class="top">
  <div class="brand">
    <svg width="40" height="36" viewBox="0 0 54 48"><rect width="54" height="48" rx="10" fill="#fff"/><path d="M13 9 H29 C39 9 45 16 45 24 C45 32 39 39 29 39 H13 Z" fill="none" stroke="#C9A227" stroke-width="3" stroke-linejoin="round"/><rect x="18" y="25" width="4.2" height="8" rx="1" fill="#0B1F3A"/><rect x="24" y="20" width="4.2" height="13" rx="1" fill="#1C3A5E"/><rect x="30" y="15" width="4.2" height="18" rx="1" fill="#C9A227"/></svg>
    <div class="name">DataControl Solutions LLC<small>Painel de Relatórios</small></div>
  </div>
  <button class="btn btn-out" id="logout" style="display:none">Sair</button>
</div>

<div id="view"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* Same project as the form */
const SUPABASE_URL = 'https://iosithfwaphdedbnlssx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Pp7pO7Mnn_6ESDBA9dbCag_NFpvcjSW';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const view = document.getElementById('view');
const logoutBtn = document.getElementById('logout');
let rows = [], selectedId = null, fStatus = 'all', fQuery = '';

logoutBtn.addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

function loginView(msg){
  logoutBtn.style.display='none';
  view.innerHTML = `<div class="login">
    <h1>Acesso restrito</h1>
    <p>Entre com sua conta de administrador para ver os relatórios dos clientes.</p>
    <label>E-mail</label><input id="em" type="email" autocomplete="username">
    <label>Senha</label><input id="pw" type="password" autocomplete="current-password">
    <div class="err" id="er">${msg||''}</div>
    <button class="btn btn-gold" id="go" style="width:100%;margin-top:8px">Entrar</button>
  </div>`;
  document.getElementById('go').addEventListener('click', doLogin);
  document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}

async function doLogin(){
  const email=document.getElementById('em').value.trim();
  const password=document.getElementById('pw').value;
  const er=document.getElementById('er'); er.textContent='Entrando…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error || !data.user){ er.textContent='E-mail ou senha incorretos.'; return; }
  await afterLogin();
}

async function afterLogin(){
  const { data: isAdmin } = await sb.rpc('is_admin');
  if(!isAdmin){ await sb.auth.signOut(); loginView('Esta conta não tem acesso de administrador.'); return; }
  logoutBtn.style.display='';
  const { data, error } = await sb.from('intakes')
    .select('user_id,answers,lang,status,summary_html,updated_at')
    .order('updated_at',{ascending:false});
  if(error){ view.innerHTML=`<div class="login"><p>Erro ao carregar: ${error.message}</p></div>`; return; }
  rows = data||[];
  dashboard();
}

function clientName(r){ return (r.answers&&r.answers.acct_name) || '(sem nome)'; }
function clientEmail(r){ return (r.answers&&r.answers.acct_email) || (r.answers&&r.answers.login_email) || ''; }
function fmtDate(s){ try{ return new Date(s).toLocaleString('pt-BR'); }catch(e){ return s; } }

function applyFilters(){
  const q=fQuery.trim().toLowerCase();
  return rows.filter(r=>{
    if(fStatus!=='all' && r.status!==fStatus) return false;
    if(q){ const hay=(clientName(r)+' '+clientEmail(r)).toLowerCase(); if(hay.indexOf(q)===-1) return false; }
    return true;
  });
}

function dashboard(){
  const filtered = applyFilters();
  const items = filtered.map(r=>`
    <div class="item ${selectedId===r.user_id?'sel':''}" data-id="${r.user_id}">
      <div class="nm">${clientName(r)}</div>
      <div class="em">${clientEmail(r)}</div>
      <span class="badge ${r.status==='submitted'?'submitted':'draft'}">${r.status==='submitted'?'Enviado':'Rascunho'}</span>
    </div>`).join('') || `<div class="empty">Nenhum cliente encontrado.</div>`;

  const sel = rows.find(r=>r.user_id===selectedId);
  let panel;
  if(!sel){
    panel = `<div class="empty">Selecione um cliente à esquerda para ver o relatório.</div>`;
  } else {
    panel = `<div class="ph">
        <h2>${clientName(sel)}</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" id="printBtn">Imprimir / PDF</button>
        </div>
      </div>
      <div class="reportbox">${sel.summary_html || '<div class="empty">Este cliente ainda não enviou o questionário (rascunho).</div>'}</div>
      <div class="docs"><h3>Documentos</h3><div id="docList">Carregando…</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">Atualizado em: ${fmtDate(sel.updated_at)}</div>
      </div>`;
  }

  view.innerHTML = `
    <div class="toolbar">
      <input id="q" placeholder="Buscar por nome ou e-mail…" value="${fQuery.replace(/"/g,'&quot;')}">
      <select id="stat">
        <option value="all" ${fStatus==='all'?'selected':''}>Todos</option>
        <option value="submitted" ${fStatus==='submitted'?'selected':''}>Enviados</option>
        <option value="draft" ${fStatus==='draft'?'selected':''}>Rascunhos</option>
      </select>
      <button class="btn btn-ghost" id="csv">Exportar planilha (CSV)</button>
    </div>
    <div class="wrap">
      <div class="list"><div class="hd">Clientes (${filtered.length})</div>${items}</div>
      <div class="panel">${panel}</div>
    </div>`;

  const q=document.getElementById('q');
  q.addEventListener('input',()=>{ fQuery=q.value; const pos=q.selectionStart; dashboard(); const nq=document.getElementById('q'); nq.focus(); try{nq.setSelectionRange(pos,pos);}catch(e){} });
  document.getElementById('stat').addEventListener('change',e=>{ fStatus=e.target.value; dashboard(); });
  document.getElementById('csv').addEventListener('click',exportCSV);
  view.querySelectorAll('.item').forEach(el=>el.addEventListener('click',()=>{ selectedId=el.dataset.id; dashboard(); }));
  const pb=document.getElementById('printBtn'); if(pb) pb.addEventListener('click',()=>window.print());
  if(sel) loadDocs(sel);
}

/* Export all (filtered) clients to a CSV spreadsheet */
function exportCSV(){
  const data = applyFilters();
  if(!data.length){ alert('Nada para exportar.'); return; }
  const skip = new Set(['acct_pw','acct_pw2','verify_code','login_pw','login_email']);
  // union of all answer keys
  const keys = [];
  data.forEach(r=>Object.keys(r.answers||{}).forEach(k=>{ if(!skip.has(k) && keys.indexOf(k)===-1) keys.push(k); }));
  const header = ['status','updated_at',...keys];
  const cell = v => {
    if(v==null) return '';
    if(typeof v==='object') v = JSON.stringify(v);
    v = String(v);
    return /[",\n;]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  };
  const lines = [header.map(cell).join(',')];
  data.forEach(r=>{
    const a=r.answers||{};
    lines.push([cell(r.status),cell(fmtDate(r.updated_at)),...keys.map(k=>cell(a[k]))].join(','));
  });
  const blob = new Blob(['\ufeff'+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'datacontrol-intakes.csv'; a.click();
  URL.revokeObjectURL(url);
}

async function loadDocs(r){
  const box=document.getElementById('docList'); if(!box) return;
  const a=r.answers||{};
  const paths=[];
  Object.keys(a).forEach(k=>{ if(k.endsWith('_paths') && Array.isArray(a[k])) a[k].forEach(p=>paths.push(p)); });
  if(!paths.length){ box.textContent='Nenhum documento enviado.'; return; }
  let html='';
  for(const path of paths){
    try{
      const { data } = await sb.storage.from('documents').createSignedUrl(path, 600);
      const name = path.split('/').pop().replace(/^\d+_/,'');
      if(data&&data.signedUrl) html+=`<a class="doc" href="${data.signedUrl}" target="_blank" rel="noopener">⬇ ${name}</a>`;
    }catch(e){ /* skip */ }
  }
  box.innerHTML = html || 'Não foi possível gerar os links.';
}

/* boot */
(async ()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(session && session.user) await afterLogin();
  else loginView();
})();
</script>
</body>
</html>
